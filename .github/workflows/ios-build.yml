name: Build iOS IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Setup Expo
        run: npx expo login --token ${{ secrets.EXPO_TOKEN }}

      - name: Install CocoaPods
        run: |
          cd ios 2>/dev/null || npx expo prebuild --platform ios --no-install
          cd ios && pod install

      - name: Build iOS IPA Locally
        run: eas build --platform ios --profile preview --local --output build.ipa --non-interactive

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitAI-iOS-Build
          path: build.ipa
