name: Build iOS IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install project dependencies
        run: npm install

      - name: Install Expo and EAS CLI
        run: npm install -g expo-cli eas-cli @expo/cli

      - name: Verify Expo Token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "ERROR: EXPO_TOKEN secret is not set!"
            echo "Go to repo Settings > Secrets > Actions and add EXPO_TOKEN"
            exit 1
          fi
          echo "EXPO_TOKEN is configured"

      - name: Prebuild iOS native project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build iOS IPA Locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile preview --local --output build.ipa --non-interactive

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitAI-iOS-Build
          path: build.ipa
