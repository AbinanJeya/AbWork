name: Build iOS IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install project dependencies
        run: npm install

      - name: Patch expo-file-system nullability for Xcode 16+
        run: |
          # Fix missing nullability specifiers that are hard errors in Xcode 16.4
          HEADER="node_modules/expo-file-system/ios/Legacy/EXSessionTasks/EXSessionTaskDelegate.h"
          if [ -f "$HEADER" ]; then
            sed -i '' '/#import <Foundation\/Foundation.h>/a\
          \
          NS_ASSUME_NONNULL_BEGIN' "$HEADER"
            sed -i '' 's/@end/@end\
          NS_ASSUME_NONNULL_END/' "$HEADER"
            # Make error parameter nullable (it can be nil on success)
            sed -i '' 's/didCompleteWithError:(NSError \*)/didCompleteWithError:(nullable NSError *)/' "$HEADER"
            echo "✅ Patched $HEADER with nullability specifiers"
          else
            echo "⚠️ Header not found, skipping patch"
          fi

      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Suppress pod warnings for Xcode 16+ compatibility
        run: |
          # Add inhibit_all_warnings! to the Podfile to suppress all pod warnings
          cd ios
          if ! grep -q 'inhibit_all_warnings!' Podfile; then
            sed -i '' '/^platform/a\
          inhibit_all_warnings!' Podfile
            echo "✅ Added inhibit_all_warnings! to Podfile"
          fi

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build unsigned IPA with xcodebuild
        run: |
          # Build the .app without code signing (AltStore will re-sign it)
          xcodebuild \
            -workspace ios/AbWork.xcworkspace \
            -scheme AbWork \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/AbWork.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            OTHER_CFLAGS='$(inherited) -Wno-nullability-completeness -Wno-nonnull' \
            archive

      - name: Package .app into .ipa
        run: |
          mkdir -p build/Payload
          cp -r build/AbWork.xcarchive/Products/Applications/AbWork.app build/Payload/
          cd build && zip -r ../build.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitAI-iOS-Build
          path: build.ipa
