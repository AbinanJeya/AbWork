name: Build iOS IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install project dependencies
        run: npm install

      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build unsigned IPA with xcodebuild
        run: |
          # Build the .app without code signing (AltStore will re-sign it)
          xcodebuild \
            -workspace ios/AbWork.xcworkspace \
            -scheme AbWork \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/AbWork.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package .app into .ipa
        run: |
          mkdir -p build/Payload
          cp -r build/AbWork.xcarchive/Products/Applications/AbWork.app build/Payload/
          cd build && zip -r ../build.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FitAI-iOS-Build
          path: build.ipa
